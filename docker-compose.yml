version: "3.9"

services:
  db:
    image: postgres:16
    container_name: subbot_db
    restart: always
    environment:
      POSTGRES_DB: subbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subbot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: subbot_app
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command: sh -c "alembic upgrade head && python -m app.main"
    ports:
      - "8000:8000"

volumes:
  postgres_data:
